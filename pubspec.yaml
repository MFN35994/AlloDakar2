name: transen
description: "A new Flutter project for transport and delivery."
publish_to: 'none'

version: 1.1.0+28

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  transen_core:
    path: packages/core
  transen_auth:
    path: packages/features/auth
  transen_maps:
    path: packages/features/maps
  transen_profile:
    path: packages/features/profile
  transen_payment:
    path: packages/features/payment
  transen_rating:
    path: packages/features/rating
  transen_trips:
    path: packages/features/trips
  google_maps_flutter: ^2.5.3
  geolocator: ^14.0.1
  shared_preferences: ^2.5.2
  firebase_auth: ^6.3.0
  firebase_core: ^4.6.0
  flutter_riverpod: ^3.3.1
  google_fonts: ^8.0.2
  cloud_firestore: ^6.2.0
  google_sign_in: ^7.2.0
  url_launcher: ^6.1.11
  intl: ^0.20.2
  lottie: ^3.3.3
  firebase_messaging: ^16.1.3
  share_plus: ^13.1.0
  path_provider: ^2.1.2
  rxdart: ^0.28.0
  flutter_polyline_points: ^3.1.0
  flutter_local_notifications: ^21.0.0
  firebase_app_check: ^0.4.3
  mask_text_input_formatter: ^2.9.0
  shimmer: ^3.0.0
  device_info_plus: ^13.1.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/logo_menu.png
    - assets/images/wave.png
    - assets/images/om.png
    - assets/images/fm.png
    - assets/images/car_top.png
    - assets/legal/cgu.md
    - assets/legal/politique_confidentialite.md

