name: Android App Distribution

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Inject Mapbox Public Token
        run: |
          sed -i 's/VOTRE_CLE_PUBLIQUE_ICI/${{ secrets.MAPBOX_PUBLIC_TOKEN }}/g' android/app/src/main/res/values/strings.xml
          sed -i 's/VOTRE_CLE_PUBLIQUE_ICI/${{ secrets.MAPBOX_PUBLIC_TOKEN }}/g' ios/Runner/Info.plist

      - name: Setup Mapbox Downloads Token
        run: |
          mkdir -p ~/.gradle
          echo "MAPBOX_DOWNLOADS_TOKEN=sk.eyJ1IjoidHJhbnNlbiIsImEiOiJjbXA5eGdjcGcwejQ3MnRzZXFkeGx4dDV2In0.FUT3_Ruc7bsNdK9QpcUtUw" >> ~/.gradle/gradle.properties

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: List Generated APKs
        run: ls -R build/app/outputs/flutter-apk/

      - name: Upload to Firebase App Distribution
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
        run: |
          npx -y firebase-tools appdistribution:distribute build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            --app "$FIREBASE_APP_ID" \
            --groups "testeurs_transen" \
            --release-notes "Build automatique v${{ github.ref_name }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          name: Release ${{ github.ref_name }}
          body: |
            Première version officielle de TranSen (v1.0.0).
            
            ### Fonctionnalités incluses :
            - Authentification par numéro de téléphone (OTP)
            - Système de Covoiturage (Pool)
            - Service de livraison de colis (Yobanté)
            - Gestion du Portefeuille et Paiements
            - Suivi de trajet en temps réel
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
