name: Android App Distribution

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload to Firebase App Distribution
        run: |
          npx -y firebase-tools appdistribution:distribute build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            --app "${{ secrets.FIREBASE_APP_ID_ANDROID || '1:552529206563:android:9ce8bac8520d403803c096' }}" \
            --groups "testeurs_transen" \
            --release-notes "Build automatique v${{ github.ref_name }}"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Upload arm-v7a to Firebase App Distribution (Optional)
        run: |
          npx -y firebase-tools appdistribution:distribute build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
            --app "${{ secrets.FIREBASE_APP_ID_ANDROID || '1:552529206563:android:9ce8bac8520d403803c096' }}" \
            --groups "testeurs_transen" \
            --release-notes "Build automatique arm-v7a v${{ github.ref_name }}"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          name: Release ${{ github.ref_name }}
          body: |
            Première version officielle de TranSen (v1.0.0).
            
            ### Fonctionnalités incluses :
            - Authentification par numéro de téléphone (OTP)
            - Système de Covoiturage (Pool)
            - Service de livraison de colis (Yobanté)
            - Gestion du Portefeuille et Paiements
            - Suivi de trajet en temps réel
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
