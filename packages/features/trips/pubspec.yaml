name: transen_trips
description: Trips and Pooling module for TranSen.
version: 0.0.1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  firebase_auth: ^6.3.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0
  geolocator: ^14.0.1
  google_maps_flutter: ^2.5.3
  mapbox_maps_flutter: ^2.0.0
  path_provider: ^2.1.2
  share_plus: ^13.1.0
  lottie: ^3.1.0
  url_launcher: ^6.3.1
  flutter_polyline_points: ^3.1.0
  rxdart: ^0.28.0
  http: ^1.2.0
  dio: ^5.4.3
  transen_core:
    path: ../../core
  transen_auth:
    path: ../auth
  transen_payment:
    path: ../payment
  transen_rating:
    path: ../rating
  transen_maps:
    path: ../maps

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
