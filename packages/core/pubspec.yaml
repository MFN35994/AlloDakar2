name: transen_core
description: Core module for TranSen containing theme, utils, and shared models.
version: 0.0.1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  intl: ^0.20.2
  geolocator: ^14.0.1
  flutter_riverpod: ^3.3.1
  firebase_core: ^4.6.0
  lottie: ^3.3.3
  shimmer: ^3.0.0
  device_info_plus: ^13.1.0
  google_maps_flutter: ^2.5.3
  firebase_messaging: ^16.1.3
  cloud_firestore: ^6.2.0
  flutter_local_notifications: ^21.0.0
  url_launcher: ^6.3.1
  package_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
